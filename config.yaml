coreNodeSelector: &coreNodeSelector
  hub.jupyter.org/node-purpose: core

jupyterhub:
  proxy:
    # chp:
    # incompatible with autopilot
    #   nodeSelector: *coreNodeSelector
    # service:
    #   type: ClusterIP
    #   annotations:
    #     cloud.google.com/backend-config: '{"default": "allow-websockets"}'
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      ingress.kubernetes.io/proxy-body-size: 64m
      # kubernetes.io/ingress.class: gce
      # networking.gke.io/managed-certificates: hub-certs
      # kubernetes.io/ingress.global-static-ip-name: "k8s2-ts-wkh8jnf6-jupyterhub-jupyterhub-a9uu66bs"
      kubernetes.io/tls-acme: "true"
    hosts:
      - sscp.finsberg.xyz
    # using gce for tls
    tls:
      - hosts:
          - sscp.finsberg.xyz
        secretName: tls-jupyterhub

  singleuser:
    events: true
    cloudMetadata:
      # incompatible with autopilot
      blockWithIptables: false
    storage:
      homeMountPath: /home/user
    image:
      name: europe-west1-docker.pkg.dev/sscp-2026/sss/simula-summer-school
      tag: "2026"
      pullPolicy: Always
    memory:
      limit: 4G
      guarantee: 4G
    cpu:
      limit: 1
      guarantee: 0.5
    uid: 1001 # match image
    extraEnv:
      CULL_CONNECTED: "1"
      CULL_TIMEOUT: "1800"
      CULL_KERNEL_TIMEOUT: "1800"
      CULL_INTERVAL: "120"
      # dijitso defaults to in-env without checking for write permissions
      DIJITSO_CACHE_DIR: "/tmp/dijitso-cache"

  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: true

  hub:
    # incompatible with autopilot
    # nodeSelector: *coreNodeSelector
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /hub/metrics
    config:
      JupyterHub:
        authenticate_prometheus: false
        authenticator_class: github
      GitHubOAuthenticator:
        allow_all: false
        allow_existing_users: true
        scope:
          - "read:user"
          - "read:org"
        admin_users:
          - finsberg
          - nforsch
        allowed_organizations:
          - scientificcomputing
          - ComputationalPhysiology
      # OAuthenticator:
      #   allow_all: false
      #   allow_existing_users: true
        # allowed_users:
        #   - finsberg
        #   - nforsch
        #   - adajel
        #   - cdaversin
        #   - hareval
        #   - ingvilddevold
        #   - jorgensd
        #   - giuliamonopoli
        #   - admcculloch
        #   - sundnes
        #   - lepmik
        #   - kjmccabe
        #   - nicolossus
      # GitHubOAuthenticator:
      #   allowed_organizations:
      #     - scientificcomputing
      #     - ComputationalPhysiology
      Spawner:
        http_timeout: 60

  scheduling:
    podPriority:
      enabled: true
    userPlaceholder:
      enabled: true
      replicas: 10
    # userScheduler, affinity incompatible with autopilot
    userScheduler:
      enabled: false
    # userPods:
    #   nodeAffinity:
    #     # TODO: 'require' when we deploy for real
    #     # 'prefer' for lower costs
    #     # matchNodePurpose: require
    #     matchNodePurpose: prefer
    # corePods:
    #   nodeAffinity:
    #     matchNodePurpose: require

grafana:
  # incompatible with autopilot
  # nodeSelector: *coreNodeSelector
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Viewer
    auth.basic:
      enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # kubernetes.io/ingress.class: gce
      # networking.gke.io/managed-certificates: hub-certs
      # kubernetes.io/ingress.global-static-ip-name: "k8s2-ts-wkh8jnf6-jupyterhub-hub-grafana-ogv1k9ar"
      kubernetes.io/tls-acme: "true"
    hosts:
      - grafana.sscp.finsberg.xyz
    # cert autopilot
    tls:
      - hosts:
          - grafana.sscp.finsberg.xyz
        secretName: tls-grafana
  persistence:
    size: 2Gi
    enabled: true
    accessModes:
      - ReadWriteOnce
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: prometheus
          orgId: 1
          type: prometheus
          url: https://prometheus.sscp.finsberg.xyz
          isDefault: true
          editable: false

prometheus:
  # nodeSelector: *coreNodeSelector
  # disable a bunch of things for autopilot
  prometheus-node-exporter:
    enabled: false
  #     updateStrategy:
  #       type: RollingUpdate
  alertmanager:
    enabled: false
  pushgateway:
    enabled: false
  rbac:
    create: true
  server:
    # nodeSelector: *coreNodeSelector
    podLabels:
      hub.jupyter.org/network-access-hub: "true"
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        # kubernetes.io/ingress.class: gce
        # networking.gke.io/managed-certificates: hub-certs
        # kubernetes.io/ingress.global-static-ip-name: "k8s2-fs-wkh8jnf6-jupyterhub-hub-prometheus-server-mswprzqv"
        kubernetes.io/tls-acme: "true"
      hosts:
        - prometheus.sscp.finsberg.xyz
      tls:
        - hosts:
            - prometheus.sscp.finsberg.xyz
          secretName: tls-prometheus
  kube-state-metrics:
    metricLabelsAllowlist:
      - pods=[app,component,hub.jupyter.org/username]
      - nodes=[*]

ingress-nginx:
  rbac:
    create: true
  statsExporter:
    service:
      annotations:
        prometheus.io/scrape: "true"
  controller:
    # nodeSelector: *coreNodeSelector
    replicaCount: 2
    scope:
      enabled: true
    config:
      # Allow POSTs of up to 64MB, for large notebook support.
      proxy-body-size: 64m
    stats:
      enabled: true
    service:
      # Preserve client IPs
      externalTrafficPolicy: Local
